<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Visor Anatómico — Mazothecoach</title>
  <script type="module" crossorigin src="/anatomy-viewer/assets/index-Dk3W8YHU.js"></script>
  <link rel="stylesheet" crossorigin href="/anatomy-viewer/assets/index-BslbOWig.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button id="toggle-sidebar" class="seg only-mobile" data-i18n="sidebar_toggle"></button>
      <h1 id="app-title">VISOR ANATÓMICO</h1>
      <span class="sub" data-i18n="tagline"></span>
      <div id="mode-switch" class="seg-group">
        <button id="mode-explore" class="seg active" data-i18n="mode_explore"></button>
        <button id="mode-exercise" class="seg" data-i18n="mode_exercise"></button>
        <button id="mode-pain" class="seg" data-i18n="mode_pain"></button>
        <button id="mode-physique" class="seg" data-i18n="mode_physique"></button>
        <button id="mode-morphology" class="seg" data-i18n="mode_morphology"></button>
        <button id="mode-movement" class="seg" data-i18n="mode_movement"></button>
      </div>
      <span class="spacer"></span>
      <div class="toggles">
        <button id="toggle-view" class="seg" title="Vista" data-i18n-title="view_toggle"></button>
        <button id="toggle-lang" class="seg">ES / EN</button>
      </div>
      <span id="status" class="status" data-i18n="status_no_model"></span>
    </header>

    <aside class="left">
      <h3 data-i18n="layers"></h3>
      <div class="layer-toggle">
        <button id="layer-muscle" class="layer-btn active" data-i18n="muscles"></button>
        <button id="layer-bone" class="layer-btn" data-i18n="bones"></button>
      </div>

      <div id="explore-panel">
        <h3 data-i18n="region"></h3>
        <div id="region-tabs" class="region-tabs"></div>

        <h3 data-i18n="search"></h3>
        <input id="search" type="search" autocomplete="off" data-i18n-ph="search_ph" />

        <div id="list" class="list"></div>
      </div>

      <div id="picker" class="picker hidden"></div>
    </aside>

    <main class="stage">
      <canvas id="canvas"></canvas>
      <div id="hud" class="hud" data-i18n="hud"></div>
      <div id="controls" class="controls">
        <select id="model-select" class="ctrl-select" title="Modelo">
          <option value="models/sample.glb" data-i18n="model_upper"></option>
          <option value="models/lower-limb.glb" data-i18n="model_lower"></option>
          <option value="__full__" data-i18n="model_full"></option>
          <option value="models/overview-skeleton.glb" data-i18n="model_skeleton"></option>
        </select>
        <label class="ctrl-check"><input type="checkbox" id="both-sides" /> <span data-i18n="both_sides"></span></label>
        <label class="ctrl-check"><input type="checkbox" id="hide-vessels" /> <span data-i18n="hide_vessels"></span></label>
        <label class="ctrl-slider" id="flex-control"><span data-i18n="knee_flex"></span><input type="range" id="knee-flex" min="0" max="120" step="1" value="0" /></label>
        <button id="btn-reset" data-i18n="reset"></button>
        <button id="btn-fit" data-i18n="fit"></button>
      </div>
      <div id="empty" class="empty">
        <div class="empty-box">
          <h2 data-i18n="empty_title"></h2>
          <p data-i18n="empty_body"></p>
        </div>
      </div>
      <div id="progress" class="progress"><span id="progress-text"></span><div class="bar"><div id="progress-bar"></div></div></div>
    </main>

    <aside class="right">
      <button id="sheet-handle" class="only-mobile" aria-hidden="true"></button>
      <button id="sheet-close" class="only-mobile" data-i18n-title="close" title="Cerrar">✕</button>
      <div id="info" class="info"></div>
    </aside>

    <div id="scrim" class="scrim"></div>

    <footer class="credit">
      <button id="about-link" class="about-link" data-i18n="about_label"></button>
      ·
      <span data-i18n="credit"></span>
      <a href="https://www.z-anatomy.com/" target="_blank" rel="noopener">Z-Anatomy</a>
      ·
      <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">CC BY-SA 4.0</a>
    </footer>
  </div>

</body>
</html>
